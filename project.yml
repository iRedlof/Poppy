name: Poppy
options:
  bundleIdPrefix: com.iredlof
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true

packages:
  PoppyCore:
    path: PoppyCore

targets:
  Poppy:
    type: application
    platform: macOS
    sources:
      - path: Poppy
        excludes:
          - "App/main.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iredlof.poppy
        PRODUCT_NAME: Poppy
        MARKETING_VERSION: "1.6.0"
        CURRENT_PROJECT_VERSION: "7"
        INFOPLIST_FILE: Poppy/Info.plist
        CODE_SIGN_ENTITLEMENTS: Poppy/Poppy.entitlements
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5D7M37QQLU
      configs:
        Release:
          DEAD_CODE_STRIPPING: YES
          ENABLE_NS_ASSERTIONS: NO
          VALIDATE_PRODUCT: YES
          SWIFT_OPTIMIZATION_LEVEL: -O
          GCC_OPTIMIZATION_LEVEL: s
    dependencies:
      - package: PoppyCore
        product: PoppyCore
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        shell: /bin/sh
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint
          else
            echo "warning: SwiftLint not installed"
          fi

  PoppyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PoppyCore/Tests/PoppyCoreTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        BUNDLE_LOADER: ""
    dependencies:
      - package: PoppyCore
        product: PoppyCore

schemes:
  Poppy:
    build:
      targets:
        Poppy: all
        PoppyTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PoppyTests
    profile:
      config: Release
    archive:
      config: Release
